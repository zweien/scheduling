name: Deploy to VPS

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy (for example: v1.0.0)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate deployment tag
        run: |
          if [ -z "${DEPLOY_TAG}" ]; then
            echo "DEPLOY_TAG is empty"
            exit 1
          fi

      - name: Deploy application
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_DIR }}"
            git fetch --all --tags
            git checkout "tags/${{ env.DEPLOY_TAG }}" -B release-deploy
            npm ci --include=dev
            set -a
            source ./.env.production
            set +a
            npm run build
            pm2 kill || true
            pm2 start ecosystem.config.js --env production --update-env
            pm2 save
