        <text x="99" y="52" text-anchor="middle" fill="#94A3B8" font-family="'Noto Sans SC', sans-serif" font-size="12">钱七</text>

        <rect x="137" y="5" width="56" height="70" rx="12" fill="#0F172A"/>
