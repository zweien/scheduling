        <text x="231" y="28" text-anchor="middle" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="14">6</text>
        <text x="231" y="52" text-anchor="middle" fill="#94A3B8" font-family="'Noto Sans SC', sans-serif" font-size="12">孙八</text>

