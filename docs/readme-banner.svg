<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主背景渐变 -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <!-- 强调色渐变 -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <!-- 青色渐变 -->
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>

    <!-- 卡片阴影 -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 网格图案 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- 装饰性圆形 -->
  <circle cx="1100" cy="120" r="200" fill="#3B82F6" opacity="0.08"/>
  <circle cx="1180" cy="560" r="160" fill="#8B5CF6" opacity="0.06"/>
  <circle cx="100" cy="520" r="180" fill="#14B8A6" opacity="0.05"/>

  <!-- 左侧文字区域 -->
  <g transform="translate(80, 100)">
    <!-- 标签 -->
    <rect x="0" y="0" width="140" height="32" rx="16" fill="url(#tealGrad)" opacity="0.9"/>
    <text x="70" y="22" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="1">TEAM SCHEDULING</text>

    <!-- 主标题 -->
    <text x="0" y="90" fill="white" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="56" font-weight="800">值班排班系统</text>

    <!-- 副标题 -->
    <text x="0" y="140" fill="#94A3B8" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="24" font-weight="500">自动排班 · 拖拽调整 · 审计追踪 · API 集成</text>

    <!-- 描述 -->
    <text x="0" y="190" fill="#64748B" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="18">为小团队打造的轻量级值班管理工具，支持月历视图、多格式导出</text>

    <!-- 特性标签 -->
    <g transform="translate(0, 230)">
      <rect x="0" y="0" width="100" height="36" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5"/>
      <text x="50" y="24" text-anchor="middle" fill="#60A5FA" font-family="system-ui, sans-serif" font-size="14" font-weight="600">月历视图</text>

      <rect x="115" y="0" width="100" height="36" rx="8" fill="#1E293B" stroke="#8B5CF6" stroke-width="1.5"/>
      <text x="165" y="24" text-anchor="middle" fill="#A78BFA" font-family="system-ui, sans-serif" font-size="14" font-weight="600">拖拽交换</text>

      <rect x="230" y="0" width="100" height="36" rx="8" fill="#1E293B" stroke="#14B8A6" stroke-width="1.5"/>
      <text x="280" y="24" text-anchor="middle" fill="#2DD4BF" font-family="system-ui, sans-serif" font-size="14" font-weight="600">REST API</text>

      <rect x="345" y="0" width="100" height="36" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5"/>
      <text x="395" y="24" text-anchor="middle" fill="#FBBF24" font-family="system-ui, sans-serif" font-size="14" font-weight="600">多格式导出</text>
    </g>

    <!-- 技术栈 -->
    <g transform="translate(0, 300)">
      <text x="0" y="0" fill="#475569" font-family="system-ui, sans-serif" font-size="13" font-weight="500">BUILT WITH</text>
      <g transform="translate(0, 15)">
        <rect x="0" y="0" width="85" height="28" rx="6" fill="#334155"/>
        <text x="42" y="19" text-anchor="middle" fill="#E2E8F0" font-family="monospace" font-size="12" font-weight="500">Next.js 16</text>

        <rect x="95" y="0" width="70" height="28" rx="6" fill="#334155"/>
        <text x="130" y="19" text-anchor="middle" fill="#E2E8F0" font-family="monospace" font-size="12" font-weight="500">React</text>

        <rect x="175" y="0" width="70" height="28" rx="6" fill="#334155"/>
        <text x="210" y="19" text-anchor="middle" fill="#E2E8F0" font-family="monospace" font-size="12" font-weight="500">SQLite</text>

        <rect x="255" y="0" width="75" height="28" rx="6" fill="#334155"/>
        <text x="292" y="19" text-anchor="middle" fill="#E2E8F0" font-family="monospace" font-size="12" font-weight="500">Tailwind</text>
      </g>
    </g>
  </g>

