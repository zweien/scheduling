        <text x="297" y="28" text-anchor="middle" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="14">14</text>
        <text x="297" y="52" text-anchor="middle" fill="#94A3B8" font-family="'Noto Sans SC', sans-serif" font-size="12">李四</text>

        <rect x="335" y="5" width="56" height="70" rx="12" fill="#0F172A"/>
        <text x="363" y="28" text-anchor="middle" fill="#F87171" font-family="system-ui, sans-serif" font-size="14">15</text>
        <text x="363" y="52" text-anchor="middle" fill="#94A3B8" font-family="'Noto Sans SC', sans-serif" font-size="12">王五</text>

